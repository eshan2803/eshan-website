name: Daily Transmission Prices Update
on:
  schedule:
    # GitHub scheduled workflows can be delayed or occasionally skipped.
    # Use several off-peak morning slots; the price update is idempotent and
    # concurrency below prevents overlapping runs.
    - cron: '52 12 * * *'  # 5:52 AM PDT
    - cron: '47 13 * * *'
    - cron: '47 14 * * *'
    - cron: '47 15 * * *'
  workflow_dispatch: # Allows you to run it manually from GitHub UI

permissions:
  contents: write

concurrency:
  group: daily-transmission-prices-update
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: simbooni

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install pandas numpy requests pytz

      - name: Run Fetch Prices Script
        run: |
          git config --global user.name "GridBot"
          git config --global user.email "bot@eshansingh.xyz"
          cd transmission
          python fetch_caiso_prices.py

      - name: Commit and Push Changes
        run: |
          cd transmission
          git add -f substations_with_prices.geojson
          git commit -m "Auto-update LMP prices for $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin simbooni
