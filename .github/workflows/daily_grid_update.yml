name: Daily California Grid Update
on:
  push:
    branches:
      - simbooni
  schedule:
    # Runs at 14:00 UTC (7:00 AM PDT) every day
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to run it manually from GitHub UI

jobs:
  update-grid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install pandas numpy matplotlib requests pytz scipy playwright selenium
          playwright install chromium

      - name: Run Update Script
        run: |
          cd GridUtilization
          python daily_update.py
        env:
          # If your script needs any API keys, add them here
          CAISO_API_KEY: ${{ secrets.CAISO_API_KEY }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GridBot"
          git config --global user.email "bot@eshansingh.xyz"
          git add .
          git commit -m "Auto-update: $(date +'%Y-%m-%d') Grid Data" || echo "No changes to commit"
          git push origin simbooni